services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ocr_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: >
      sh -lc "mkdir -p storage/app/private storage/framework/cache storage/framework/sessions storage/framework/views storage/logs bootstrap/cache
      && chown -R www-data:www-data storage bootstrap/cache
      && chmod -R ug+rwX storage bootstrap/cache
      && php-fpm"
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres
      - redis

  nginx:
    image: nginx:1.27-alpine
    container_name: ocr_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: ocr_postgres
    environment:
      POSTGRES_DB: ocr_platform
      POSTGRES_USER: ocr_user
      POSTGRES_PASSWORD: ocr_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ocr_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ocr_worker
    working_dir: /var/www/html
    command: >
      sh -lc "chown -R www-data:www-data storage bootstrap/cache
      && chmod -R ug+rwX storage bootstrap/cache
      && su -s /bin/sh www-data -c 'php artisan queue:work redis --queue=ocr,default --tries=3 --timeout=420 --sleep=1'"
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
      - redis
      - postgres

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ocr_scheduler
    working_dir: /var/www/html
    command: >
      sh -lc "chown -R www-data:www-data storage bootstrap/cache
      && chmod -R ug+rwX storage bootstrap/cache
      && su -s /bin/sh www-data -c 'php artisan schedule:work'"
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - app
      - redis

volumes:
  postgres_data:
  redis_data:
